<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="login-box">
  <h2 id="title">Login</h2>

  <input id="email" placeholder="Enter email"><br><br>
  <input id="password" type="password" placeholder="Enter password"><br><br>

  <button onclick="handleAuth()">Login</button>

  <p id="toggle">
    Don't have account?
    <a href="#" onclick="toggleMode()">Signup</a>
  </p>
</div>

<script>
let isSignup = false;

function toggleMode() {
  isSignup = !isSignup;

  document.getElementById("title").innerText = isSignup ? "Signup" : "Login";
  document.querySelector("button").innerText = isSignup ? "Signup" : "Login";

  document.getElementById("toggle").innerHTML =
    isSignup
      ? 'Already have account? <a href="#" onclick="toggleMode()">Login</a>'
      : 'Don’t have account? <a href="#" onclick="toggleMode()">Signup</a>';
}

function handleAuth() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if (!email || !pass) {
    alert("Enter email & password");
    return;
  }

  if (isSignup) {
    localStorage.setItem("userEmail", email);
    localStorage.setItem("userPass", pass);
    alert("Signup success");
  } else {
    const savedEmail = localStorage.getItem("userEmail");
    const savedPass = localStorage.getItem("userPass");

    if (email === savedEmail && pass === savedPass) {
      localStorage.setItem("loggedIn", "true");
      window.location.href = "/dashboard";
    } else {
      alert("Invalid login");
    }
  }
}
</script>

</body>
</html>
