<!DOCTYPE html>
<html>
<head>
  <title>Track Orders</title>
</head>
<body>

<h2>Order List</h2>
<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXfzO34BmXc1JqX_5U8t-VywpnccwJslI",
  authDomain: "order-tracking-system-eb37b.firebaseapp.com",
  projectId: "order-tracking-system-eb37b",
  storageBucket: "order-tracking-system-eb37b.firebasestorage.app",
  messagingSenderId: "554833467629",
  appId: "1:554833467629:web:0bfba09a83a37efe6ad4e4",
  measurementId: "G-7YYPTXTTNR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadOrders() {
  const querySnapshot = await getDocs(collection(db, "orders"));
  let html = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    html += `
      <p>
        ${data.customer_name} - ${data.product} - ${data.status}
        <button onclick="updateStatus('${docSnap.id}', '${data.status}')">
          Update
        </button>
      </p>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

async function updateStatus(id, currentStatus) {
  let newStatus = currentStatus;

  if (currentStatus === "Placed") {
    newStatus = "Shipped";
  } else if (currentStatus === "Shipped") {
    newStatus = "Delivered";
  } else {
    alert("Already Delivered ✅");
    return;
  }

  const orderRef = doc(db, "orders", id);

  await updateDoc(orderRef, {
    status: newStatus
  });

  alert("Status updated to " + newStatus);
  location.reload();
}

window.updateStatus = updateStatus;

loadOrders();

</script>

</body>
</html>
